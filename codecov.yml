codecov:
  require_ci_to_pass: true

coverage:
  precision: 1
  round: down
  range: 0..100
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
